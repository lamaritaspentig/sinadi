<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <title>LAMARITA - UPT SPF SMPN 3 Makassar</title>
  
  <!-- Koneksi PWA & Desain iOS Safari -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1e40af" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="LAMARITA" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="icon" type="image/png" href="icon-192.png" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #f3f4f6;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
      user-select: none;
    }

    .iframe-container {
      width: 100%;
      height: 100dvh;
      position: relative;
      overflow: hidden;
    }

    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: none;
      opacity: 0;
      transition: opacity 0.5s ease-in-out;
    }

    iframe.loaded {
      opacity: 1;
    }

    /* Layar Loading Premium */
    #loader-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1e40af 0%, #1e3a8a 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      color: white;
      transition: opacity 0.6s ease-out, visibility 0.6s;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 5px solid rgba(255, 255, 255, 0.2);
      border-top: 5px solid #ffffff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }

    .logo-text {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 2px;
      margin-bottom: 8px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.2);
    }

    .sub-text {
      font-size: 13px;
      opacity: 0.8;
      font-weight: 400;
      letter-spacing: 1px;
    }

    /* Detektor Masalah & Tombol Darurat */
    #error-helper {
      display: none;
      margin-top: 25px;
      background: rgba(255, 255, 255, 0.1);
      padding: 15px;
      border-radius: 12px;
      max-width: 320px;
      text-align: center;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      animation: fadeIn 0.5s ease-out;
    }

    #error-helper p {
      font-size: 12px;
      margin: 0 0 10px 0;
      line-height: 1.5;
    }

    .btn-action {
      background-color: #ffffff;
      color: #1e40af;
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: transform 0.2s;
    }

    .btn-action:active {
      transform: scale(0.95);
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div id="loader-container">
    <div class="spinner"></div>
    <div class="logo-text">LAMARITA</div>
    <div class="sub-text">UPT SPF SMPN 3 MAKASSAR</div>
    
    <!-- Muncul otomatis jika loading halaman Google Script terlalu lama (lebih dari 7 detik) -->
    <div id="error-helper">
      <p>Pemuatan terasa lambat? Pastikan Anda sudah login akun Google belajar/kerja atau periksa jaringan internet Anda.</p>
      <a href="https://script.google.com/a/~/macros/s/AKfycbytmuevnNiT1ZZJYT6D-popHsMpM53rl64GZSOe3yT9QqJ0GL53E9jH35Ggipx2zM41/exec" 
         target="_blank" 
         class="btn-action">
         Buka Langsung di Tab Baru
      </a>
    </div>
  </div>

  <div class="iframe-container">
    <iframe
      id="app"
      src="https://script.google.com/a/~/macros/s/AKfycbytmuevnNiT1ZZJYT6D-popHsMpM53rl64GZSOe3yT9QqJ0GL53E9jH35Ggipx2zM41/exec"
      scrolling="yes"
      allowfullscreen="true"
      webkitallowfullscreen="true"
      mozallowfullscreen="true"
      allow="fullscreen; camera; microphone; display-capture; geolocation;">
    </iframe>
  </div>

  <script>
    const iframe = document.getElementById('app');
    const loader = document.getElementById('loader-container');
    const errorHelper = document.getElementById('error-helper');

    // Jika dalam 7 detik iframe belum memberikan sinyal selesai muat, tampilkan tombol bantuan
    const timeoutTracker = setTimeout(() => {
      errorHelper.style.display = 'block';
    }, 7000);

    // Ketika Iframe berhasil dimuat sepenuhnya
    iframe.addEventListener('load', () => {
      clearTimeout(timeoutTracker);
      iframe.classList.add('loaded');
      
      // Berikan efek transisi halus saat menutup loader
      loader.style.opacity = '0';
      setTimeout(() => {
        loader.style.visibility = 'hidden';
      }, 600);
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then((registration) => {
            console.log('Service Worker berhasil terdaftar di ruang lingkup:', registration.scope);
          })
          .catch((error) => {
            console.warn('Gagal mendaftarkan Service Worker:', error);
          });
      });
    }
  </script>
</body>
</html>
