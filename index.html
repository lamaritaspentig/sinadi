  <link rel="icon" href="#" />
  <style>
    * {
      box-sizing: border-box;
    }
    
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #eee;
      overflow: hidden; /* Mencegah scroll pada body utama */
      position: fixed;  /* Tambahan untuk iOS Safari agar tidak memantul (bounce effect) */
    }

    .iframe-container {
      width: 100%;
      height: 100vh;   /* Fallback untuk browser lawas */
      height: 100dvh;  /* Mengikuti dynamic viewport mobile modern */
      overflow: hidden;
      -webkit-overflow-scrolling: touch; /* Membuat scroll di iOS lebih mulus jika ada */
    }

    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

  <div class="iframe-container">
    <iframe
      id="app"
      src="https://script.google.com/macros/s/AKfycbytmuevnNiT1ZZJYT6D-popHsMpM53rl64GZSOe3yT9QqJ0GL53E9jH35Ggipx2zM41/exec"
      allowfullscreen
      allow="fullscreen; camera; microphone; display-capture; geolocation;">

  </div>

</body>
</html>
